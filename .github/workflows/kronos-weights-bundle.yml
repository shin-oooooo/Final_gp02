# GitHub 网页「Code → Download ZIP」不会展开 Git LFS，压缩包里只有指针文件。
# 本工作流在 Runner 上 checkout + LFS 后打包，供下载含真实权重的 ZIP（Actions → Artifacts）。
name: Bundle Kronos weights (ZIP)

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout with Git LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify safetensors are binaries (not LFS pointers)
        run: |
          set -e
          for f in kronos_weights/kronos-small/model.safetensors kronos_weights/tokenizer-base/model.safetensors; do
            if ! test -f "$f"; then
              echo "::error::missing $f"
              exit 1
            fi
            if head -1 "$f" | grep -q 'version https://git-lfs.github.com/spec/v1'; then
              echo "::error::$f is still a Git LFS pointer — LFS smudge failed"
              exit 1
            fi
          done
          ls -lh kronos_weights/kronos-small/model.safetensors kronos_weights/tokenizer-base/model.safetensors

      - name: Create ZIP (kronos-small + tokenizer-base)
        run: |
          set -e
          zip -r kronos_weights_full.zip kronos_weights/kronos-small kronos_weights/tokenizer-base

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kronos_weights_full
          path: kronos_weights_full.zip
          retention-days: 30
